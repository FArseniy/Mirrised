map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream mirrised_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mirror.erised.click;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mirrised-acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# trans.erised.click is reserved for Coturn. It serves ACME challenges only.
server {
    listen 80;
    listen [::]:80;
    server_name trans.erised.click;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mirrised-acme;
    }

    location / {
        return 404;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mirror.erised.click;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/mirror.erised.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirror.erised.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Helmet supplies the application headers. These cover the proxy layer.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://mirrised_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Do not preserve a client-provided X-Forwarded-For header: the app
        # trusts this single proxy hop for rate limits and PIN throttling.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trans.erised.click;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/trans.erised.click/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trans.erised.click/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    location / { return 404; }
}
